<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="assets/leaves-of-a-plant.png" />
    <title>Plant Love</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <nav class="navbar">
      <img
        id="logoPeraphone"
        src="assets/leaves-of-a-plant.png"
        alt="logo"
        style="height: 40px"
      />
      <div class="logo">Plant Love</div>
      <div class="contenedor-badge">
        <span id="badge">0</span>
      </div>
    </nav>

    <main>
      <div id="notificaciones"></div>

      <div class="card" style="width: 18rem">
        <img
          src="assets/calathea Makoyana.jpg"
          class="card-img-top"
          alt="..."
        />
        <div class="card-body">
          <h5 class="card-title">calathea Makoyana</h5>
          <h4 class="precios">$190</h4>
          <button
            class="btn-agregar"
            data-nombre="Calathea Makoyana"
            data-precio="190"
          >
            Agregar al carrito
          </button>
        </div>
      </div>
      <div class="card" style="width: 18rem">
        <img
          src="assets/Monstera deliciosa.jpg"
          class="card-img-top"
          alt="..."
        />
        <div class="card-body">
          <h5 class="card-title">Monstera deliciosa</h5>
          <h4 class="precios">$600</h4>
          <button
            class="btn-agregar"
            data-nombre="Monstera deliciosa"
            data-precio="600"
          >
            Agregar al carrito
          </button>
        </div>
      </div>
      <div class="card" style="width: 18rem">
        <img src="assets/ficus lidata.jpg" class="card-img-top" alt="..." />
        <div class="card-body">
          <h5 class="card-title">Ficus lidata</h5>
          <h4 class="precios">$230</h4>
          <button
            class="btn-agregar"
            data-nombre="Ficus lidata"
            data-precio="230"
          >
            Agregar al carrito
          </button>
        </div>
      </div>
      <div class="card" style="width: 18rem">
        <img
          src="assets/philodendrum cara de caballo.jpg"
          class="card-img-top"
          alt="..."
        />
        <div class="card-body">
          <h5 class="card-title">Philodendrum Cara de Caballo</h5>
          <h4 class="precios">$180</h4>
          <button
            class="btn-agregar"
            data-nombre="Philodendrum Cara de Caballo"
            data-precio="180"
          >
            Agregar al carrito
          </button>
        </div>
      </div>

      <ul id="lista-carrito"></ul>
      <p>Total: $<span id="total">0</span></p>
      <button id="btn-vaciar" style="display: none" .>Vaciar Carrito</button>
    </main>
    <script src="app.js"></script>
  </body>
</html>
